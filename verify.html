<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MalikNode</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
const params = new URLSearchParams(window.location.search);
const email = params.get('email') || '';
const name = params.get('name') || '';
const password = params.get('password') || '';

document.getElementById('otpInstruct').textContent = `Verification code sent to ${email}`;

lucide.createIcons();

// ===== PARTICLES =====
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 40; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (8 + Math.random() * 15) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  p.style.width = (1 + Math.random() * 2) + 'px';
  p.style.height = p.style.width;
  p.style.opacity = 0.1 + Math.random() * 0.4;
  if (Math.random() > 0.5) p.style.background = 'rgba(59,130,246,0.4)';
  particlesEl.appendChild(p);
}

function showPanel(panel) {
  const panels = { otp: 'otpPanel', success: 'successPanel' };
  Object.values(panels).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('hidden');
  });
  const target = document.getElementById(panels[panel]);
  if (target) target.classList.remove('hidden');
  lucide.createIcons();
}

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.querySelector('i').setAttribute('data-lucide', type === 'error' ? 'alert-circle' : 'check-circle');
  document.getElementById('toast-msg').textContent = msg;
  t.style.borderColor = type === 'error' ? 'rgba(239,68,68,0.25)' : 'rgba(34,197,94,0.25)';
  t.style.background = type === 'error' ? 'rgba(239,68,68,0.12)' : 'rgba(34,197,94,0.12)';
  t.style.color = type === 'error' ? '#ef4444' : '#22c55e';
  lucide.createIcons();
  t.style.transform = 'translateX(-50%) translateY(0)';
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.style.transform = 'translateX(-50%) translateY(100px)';
    t.style.opacity = '0';
  }, 3000);
}

async function submitOTP(e) {
  e.preventDefault();
  const code = document.getElementById('otpCode').value.trim();
  const btn = document.getElementById('otpBtn');
  const btnText = document.getElementById('otpBtnText');
  const spinner = document.getElementById('otpSpinner');
  btn.disabled = true;
  btnText.classList.add('hidden');
  spinner.classList.remove('hidden');

  try {
    const subdomain = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    const res = await fetch("https://api.maliknode.app/api/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: email.split("@")[0],
        password: password,
        subdomain: subdomain || "user" + Math.floor(Math.random() * 1000),
        email: email,
        otp: code,
        plan: "Starter",
        region: "NYC"
      })
    });
    const data = await res.json();
    if (res.ok && data.status === "success") {
      showPanel('success');
      runSuccessSteps();
    } else {
      showToast(data.detail || "Invalid code. Please try again.", "error");
    }
  } catch (err) {
    showToast("Server connection error", "error");
  } finally {
    btn.disabled = false;
    btnText.classList.remove('hidden');
    spinner.classList.add('hidden');
  }
}

async function resendOTP() {
  showToast("Resending code...");
  try {
    const res = await fetch("https://api.maliknode.app/api/auth/send-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (res.ok && data.status === "success") {
      showToast("Verification code resent.");
    } else {
      showToast("Failed to resend code.", "error");
    }
  } catch (err) {
    showToast("Server connection error", "error");
  }
}

function runSuccessSteps() {
  setTimeout(() => {
    const icon = document.getElementById('step3Icon');
    const text = document.getElementById('step3Text');
    icon.innerHTML = '<i data-lucide="check" class="w-3 h-3 text-green-400"></i>';
    icon.className = 'w-6 h-6 rounded-full bg-green-500/10 flex items-center justify-center';
    text.textContent = 'Mesh network ready';
    text.className = 'text-xs text-neutral-300';
    lucide.createIcons();

    const goBtn = document.getElementById('goLogin');
    goBtn.style.opacity = '1';
    goBtn.style.pointerEvents = 'all';
    lucide.createIcons();
  }, 2500);
}

function goToLogin() {
  window.location.href = '/login?signup_completed=true';
}
</script>
</body>
</html>
